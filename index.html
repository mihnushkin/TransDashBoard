<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд Транспорту</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="tabs-container">
        <div class="tabs-group">
            <button class="tab" data-target="Локальна">Міська</button>
            <button class="tab active" data-target="Регіональна">Регіональна</button>
            <button class="tab" data-target="Міжрегіональна">Міжрегіональна</button>
        </div>
        
        <div class="date-dropdown">
            <button class="date-dropdown-btn" id="dateDropdownBtn">Оберіть дати</button>
            <div class="date-dropdown-content" id="dateFilterContainer"></div>
        </div>
    </header>

    <div id="status">Завантаження даних...</div>

    <main class="dashboard-layout">
        <div class="chart-wrapper">
            <h3>Собівартість транспорту по типу (грн/кг)</h3>
            <canvas id="costChart"></canvas>
        </div>
        <div class="chart-wrapper" id="utilizationWrapper">
            <h3>Коефіцієнт утилізації (%)</h3>
            <canvas id="utilizationChart"></canvas>
        </div>
        <div class="chart-wrapper">
            <h3>Ефективність завантаження (%)</h3>
            <canvas id="loadChart"></canvas>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
